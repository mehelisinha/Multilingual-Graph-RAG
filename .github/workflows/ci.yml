name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend · Ruff + mypy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install CI dependencies
        run: uv sync --frozen --group ci && uv pip install "setuptools>=69.0.0,<70.0.0"

      - name: Ruff (lint)
        run: uv run ruff check --fix . || true

      - name: Ruff (format check)
        run: uv run ruff format . || true

      - name: Auto-commit Ruff fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix Ruff formatting and linting"

      - name: mypy (type check)
        run: uv run mypy --config-file mypy.ini app

  backend-test:
    name: Backend · pytest
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install CI dependencies
        run: uv sync --frozen --group ci && uv pip install "setuptools>=69.0.0,<70.0.0" pip

      - name: Download spaCy models
        run: uv run python -m spacy download en_core_web_sm && uv run python -m spacy download de_core_news_sm

      - name: Run unit tests
        run: uv run pytest -m "unit or not integration and not e2e" --cov=app --cov-report=term-missing

  frontend-lint:
    name: Frontend · ESLint + Prettier + tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Prettier (format check)
        working-directory: frontend
        run: npm run format:check

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript (type check)
        working-directory: frontend
        run: npm run typecheck

  frontend-test:
    name: Frontend · Vitest
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run tests
        working-directory: frontend
        run: npm test
