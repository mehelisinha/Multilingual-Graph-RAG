# Local development stack — Phase 1
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rag_platform
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/changeme
    ports:
      - "7474:7474"
      - "7687:7687"

  # milvus, backend, frontend — to be added in Phase 1
